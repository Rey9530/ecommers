name: Build & Push ecommerce Docker Image

# ============================================================
# CI: compilar y publicar imagen Docker en Docker Hub
#   - Cada push a main    -> reyles/ecommerce:latest + :sha-<short>
#   - Manual (workflow_dispatch) -> mismo, con tag personalizable
#
# Secrets requeridos en GitHub (Settings -> Secrets and variables -> Actions):
#   - DOCKERHUB_USERNAME  = reyles
#   - DOCKERHUB_TOKEN     = Docker Hub Personal Access Token (Read & Write)
#   - NEXT_PUBLIC_API_URL = URL del backend, ej. https://ar3-bk.helixsys.dev
# ============================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Tag personalizado (opcional, default "latest")'
        required: false
        default: 'latest'

permissions:
  contents: read

jobs:
  build-push:
    name: Build & push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para git short SHA en tags

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Genera tags y labels OCI estándar desde el contexto del evento.
      #   - :sha-<short> siempre
      #   - :latest en pushes a main y en workflows manuales (con override opcional)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: reyles/ecommerce
          tags: |
            type=sha,format=short
            type=raw,value=${{ github.event_name == 'workflow_dispatch' && inputs.tag_override || 'latest' }}
          labels: |
            org.opencontainers.image.title=ecommerce
            org.opencontainers.image.description=Storefront Next.js para sys-ar3 (bolsas decorativas B2C+B2B)
            org.opencontainers.image.source=https://github.com/Rey9530/ecommers
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de capas GitHub Actions (re-uso entre runs, 60-80% más rápido)
          cache-from: type=gha,scope=ecommerce
          cache-to: type=gha,scope=ecommerce,mode=max
          # Build-arg NEXT_PUBLIC_API_URL se embebe en el bundle durante `next build`
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
